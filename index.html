<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ideaspect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0c102d">
  <style>
    :root {
      --navy: #0c102d;
      --orange: #ff9d4c;
      --beige: #ecece4;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: #05071a;
      color: var(--beige);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    canvas#bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .stage {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      transition: transform 700ms cubic-bezier(.2,.7,.2,1);
    }
    .logo-wrap {
      transition: transform 700ms cubic-bezier(.2,.7,.2,1);
    }
    .logo {
      width: min(56vw, 420px);
      height: auto;
      display: block;
      filter: drop-shadow(0 0 40px rgba(255,157,76,.12));
      transition: width 700ms cubic-bezier(.2,.7,.2,1);
    }
    .gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeIn 800ms 400ms forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }
    .gate-label {
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(236,236,228,0.5);
    }
    .gate-form {
      display: flex;
      align-items: center;
      gap: 0;
      background: rgba(12,16,45,0.55);
      border: 1px solid rgba(236,236,228,0.12);
      border-radius: 999px;
      padding: 4px 4px 4px 22px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: border-color 200ms, box-shadow 200ms;
    }
    .gate-form:focus-within {
      border-color: rgba(255,157,76,0.5);
      box-shadow: 0 0 0 4px rgba(255,157,76,0.08);
    }
    .gate-form.shake { animation: shake 360ms; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }
    .gate-form input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--beige);
      font: inherit;
      font-size: 15px;
      letter-spacing: 0.08em;
      width: 220px;
      padding: 10px 0;
    }
    .gate-form input::placeholder { color: rgba(236,236,228,0.35); }
    .gate-form button {
      background: var(--orange);
      color: var(--navy);
      border: none;
      border-radius: 999px;
      padding: 10px 18px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 120ms, background 120ms;
    }
    .gate-form button:hover { transform: translateY(-1px); }
    .gate-form button:active { transform: translateY(0); }
    .gate-error {
      font-size: 12px;
      color: rgba(255,157,76,0.85);
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    /* Unlocked state */
    body.unlocked .stage { transform: translateY(0); }
    body.unlocked .logo { width: min(28vw, 180px); }
    body.unlocked .gate { display: none; }
    body.unlocked .directory { display: grid; }

    .directory {
      display: none;
      width: 100%;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 8px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 4px;
      animation: fadeIn 600ms forwards;
    }
    .card {
      display: block;
      text-decoration: none;
      color: var(--beige);
      background: rgba(12,16,45,0.55);
      border: 1px solid rgba(236,236,228,0.1);
      border-radius: 14px;
      padding: 18px 16px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: transform 180ms, border-color 180ms, background 180ms;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(255,157,76,0.45);
      background: rgba(12,16,45,0.75);
    }
    .card-name {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin: 0 0 4px 0;
    }
    .card-desc {
      font-size: 12px;
      color: rgba(236,236,228,0.55);
      margin: 0;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      .gate-form input { width: 160px; }
      .directory { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <main>
    <div class="stage">
      <div class="logo-wrap">
        <img class="logo" src="ideaspect_LOGO_white.png" alt="Ideaspect">
      </div>

      <div class="gate">
        <div class="gate-label">Enter Code</div>
        <form class="gate-form" id="gate-form" autocomplete="off">
          <input id="gate-input" type="password" inputmode="text" placeholder="••••••••" aria-label="Access code" autocapitalize="off" autocorrect="off" spellcheck="false">
          <button type="submit">Enter</button>
        </form>
        <div class="gate-error" id="gate-error"></div>
      </div>

      <div class="directory" id="directory"></div>
    </div>
  </main>

  <script>
    // ---- CONFIG ---------------------------------------------------------
    // Soft gate only. Anyone can read this file. Use Cloudflare Access
    // for real protection.
    const PASSCODE = 'ideaspect';

    // Edit this list as projects come online. href can be a relative path
    // (./swim-coach/) or a full URL (https://...).
    const PROJECTS = [
      { name: 'eTeaser',          desc: 'Deal launch email redesign',         href: './eteaser/' },
      { name: 'Market Overview',  desc: 'Bloomberg-style market dashboard',   href: './market-overview/' },
      { name: 'Monopoly Hastings',desc: 'Game prototype',                     href: './monopoly_hastings/' },
      { name: 'Swim Coach',       desc: 'Training log + trends',              href: './swim-coach/' },
      { name: 'Senior Portfolio', desc: 'Photo portfolio',                    href: './senior-portfolio/' },
      { name: 'Travel Planner',   desc: 'Itinerary tool',                     href: './travel-planner/' },
      { name: 'Euro Football',    desc: 'Match tracker',                      href: './euro-football/' },
      { name: 'Last.fm',          desc: 'Listening visualizer',               href: './lastfm/' },
    ];
    // ---------------------------------------------------------------------

    // Background: warped grid + cursor glow
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    let mx = innerWidth / 2, my = innerHeight / 2;
    let tx = mx, ty = my;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = innerWidth * dpr;
      canvas.height = innerHeight * dpr;
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    addEventListener('resize', resize);

    addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    addEventListener('touchmove', e => {
      if (e.touches[0]) { mx = e.touches[0].clientX; my = e.touches[0].clientY; }
    }, { passive: true });

    // Idle drift so the page feels alive without input
    let t0 = performance.now();
    function idleDrift(now) {
      const t = (now - t0) / 1000;
      // only drift if cursor hasn't moved recently (mx,my init'd to center)
      return {
        x: innerWidth * 0.5 + Math.sin(t * 0.35) * innerWidth * 0.18,
        y: innerHeight * 0.5 + Math.cos(t * 0.27) * innerHeight * 0.18,
      };
    }
    let lastMove = 0;
    addEventListener('mousemove', () => lastMove = performance.now());
    addEventListener('touchmove', () => lastMove = performance.now(), { passive: true });

    function draw(now) {
      const idleFor = now - lastMove;
      let targetX = mx, targetY = my;
      if (idleFor > 1500) {
        const d = idleDrift(now);
        const blend = Math.min(1, (idleFor - 1500) / 1200);
        targetX = mx * (1 - blend) + d.x * blend;
        targetY = my * (1 - blend) + d.y * blend;
      }
      tx += (targetX - tx) * 0.08;
      ty += (targetY - ty) * 0.08;

      const w = innerWidth, h = innerHeight;

      // base radial gradient — navy core, near-black edges
      const base = ctx.createRadialGradient(tx, ty, 0, tx, ty, Math.max(w, h) * 0.85);
      base.addColorStop(0, '#1a2050');
      base.addColorStop(0.45, '#0c102d');
      base.addColorStop(1, '#04061a');
      ctx.fillStyle = base;
      ctx.fillRect(0, 0, w, h);

      // warped grid
      const spacing = w < 600 ? 44 : 56;
      const step = 10;
      const influence = 260;
      const strength = 70;

      ctx.lineWidth = 1;

      // vertical lines bend horizontally toward cursor
      for (let x = 0; x <= w + spacing; x += spacing) {
        ctx.beginPath();
        for (let y = 0; y <= h; y += step) {
          const dx = x - tx, dy = y - ty;
          const dist = Math.hypot(dx, dy);
          const force = Math.max(0, 1 - dist / influence);
          const f2 = force * force;
          const offset = f2 * strength * (dx >= 0 ? 1 : -1);
          const px = x + offset;
          if (y === 0) ctx.moveTo(px, y);
          else ctx.lineTo(px, y);
        }
        // brighter near cursor
        const dxLine = x - tx;
        const proximity = Math.max(0, 1 - Math.abs(dxLine) / 400);
        const alpha = 0.05 + proximity * 0.18;
        ctx.strokeStyle = `rgba(255, 157, 76, ${alpha})`;
        ctx.stroke();
      }

      // horizontal lines bend vertically toward cursor
      for (let y = 0; y <= h + spacing; y += spacing) {
        ctx.beginPath();
        for (let x = 0; x <= w; x += step) {
          const dx = x - tx, dy = y - ty;
          const dist = Math.hypot(dx, dy);
          const force = Math.max(0, 1 - dist / influence);
          const f2 = force * force;
          const offset = f2 * strength * (dy >= 0 ? 1 : -1);
          const py = y + offset;
          if (x === 0) ctx.moveTo(x, py);
          else ctx.lineTo(x, py);
        }
        const dyLine = y - ty;
        const proximity = Math.max(0, 1 - Math.abs(dyLine) / 400);
        const alpha = 0.04 + proximity * 0.14;
        ctx.strokeStyle = `rgba(236, 236, 228, ${alpha})`;
        ctx.stroke();
      }

      // soft warm glow at cursor
      const glow = ctx.createRadialGradient(tx, ty, 0, tx, ty, 320);
      glow.addColorStop(0, 'rgba(255, 157, 76, 0.20)');
      glow.addColorStop(0.5, 'rgba(255, 157, 76, 0.04)');
      glow.addColorStop(1, 'rgba(255, 157, 76, 0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, w, h);

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // Gate
    const form = document.getElementById('gate-form');
    const input = document.getElementById('gate-input');
    const errEl = document.getElementById('gate-error');
    const dirEl = document.getElementById('directory');

    function renderDirectory() {
      dirEl.innerHTML = PROJECTS.map(p => `
        <a class="card" href="${p.href}">
          <p class="card-name">${p.name}</p>
          <p class="card-desc">${p.desc}</p>
        </a>
      `).join('');
    }

    function unlock(persist) {
      document.body.classList.add('unlocked');
      renderDirectory();
      if (persist) {
        try { localStorage.setItem('ideaspect.unlocked', '1'); } catch (e) {}
      }
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      if (input.value.trim().toLowerCase() === PASSCODE.toLowerCase()) {
        errEl.textContent = '';
        unlock(true);
      } else {
        form.classList.remove('shake');
        void form.offsetWidth;
        form.classList.add('shake');
        errEl.textContent = 'Incorrect code';
        input.select();
      }
    });

    // Auto-unlock if previously entered
    try {
      if (localStorage.getItem('ideaspect.unlocked') === '1') unlock(false);
    } catch (e) {}
  </script>
</body>
</html>
